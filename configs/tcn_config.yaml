model:
  type: tcn
  num_classes: 330
  num_channels: [64, 128, 256, 256]
  kernel_size: 5
  num_layers: 4
  dropout: 0.3

training:
  epochs: 120
  batch_size: 16
  learning_rate: 1e-3
  weight_decay: 1e-4
  warmup_epochs: 10
  optimizer: adamw
  betas: [0.9, 0.999]
  scheduler: cosine_annealing
  eta_min: 1e-6
  loss: cross_entropy
  label_smoothing: 0.1

augmentation:
  enabled: true
  augment_factor: 10
  scale: [0.9, 1.1]
  translation: 0.05
  time_warp: [0.8, 1.2]
  noise_std: 0.01
  joint_dropout: 0.1

validation:
  val_split: 0.15
  min_videos_per_class: 2
  monitor_metric: val_acc
  patience: 15

hardware:
  device: cuda
  mixed_precision: true
  num_workers: 4
  pin_memory: true
  seed: 42

output:
  save_best: true
  save_interval: 10
  log_interval: 10
